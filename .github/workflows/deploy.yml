name: Build And Deploy Utility App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Prepare Deploy Bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R dist/assets deploy/assets
          cp dist/index.html deploy/app.html

      - name: Push to Website Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: 'deploy'
          destination-github-username: 'biosxxx'
          destination-repository-name: 'cadautoscript.com'
          target-directory: 'static/utility-apps/pressure-vessel-dished-end-calc'
          user-email: 'bot@react-table-editor.com'
          user-name: 'github-actions[bot]'
          commit-message: 'Deploy pressure-vessel-dished-end-calc from ${{ github.sha }}'
          target-branch: main
